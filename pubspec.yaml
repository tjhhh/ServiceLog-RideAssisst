name: ride_assist
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: ^3.9.2

dependencies:
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.3.1
  geolocator: ^14.0.2
  image_cropper: ^12.2.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  state_notifier: ^1.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/logo_ra.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/assets/logo_ra.png
